# Supabase Keep-Alive
# 무료 Supabase 프로젝트는 1주일간 DB 활동이 없으면 자동 일시정지(Pause)된다.
# 이 워크플로우가 3일마다 (1) Supabase에 가벼운 조회를 보내 DB를 깨우고,
# (2) 타임스탬프 파일을 커밋해 GitHub Actions 스케줄 자체가 60일 무활동으로
#     비활성화되는 것까지 함께 방지한다. => 사람 개입 없이 영구 유지.
#
# 사용된 URL/anon 키는 브라우저 번들에 이미 노출되는 public 값이라 안전하다.
name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 6 */3 * *'   # UTC 06:00, 3일마다 (최대 간격 ~4일 < 7일 정지 기준)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write             # 타임스탬프 커밋용

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (사진 1건 조회)
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ofsbfpbrxvzranivoefy.supabase.co/rest/v1/photos?select=id&limit=1" \
            -H "apikey: sb_publishable_dKcREuhLa9OukaXX__ApVA_aoCyyqqW" \
            -H "Authorization: Bearer sb_publishable_dKcREuhLa9OukaXX__ApVA_aoCyyqqW")
          echo "Supabase 응답 코드: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Supabase ping 실패 (HTTP $HTTP)"
            exit 1
          fi
          echo "✅ Supabase 정상 — 일시정지 타이머 리셋됨"

      - name: Checkout
        uses: actions/checkout@v4

      - name: 타임스탬프 갱신 후 커밋 (GitHub Actions 스케줄 유지용)
        run: |
          mkdir -p .keepalive
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive/last-ping.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive/last-ping.txt
          git commit -m "chore: keep-alive ping $(date -u +%Y-%m-%d)" || echo "변경 없음, 스킵"
          git push
